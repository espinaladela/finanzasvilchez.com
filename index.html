<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MV Finanzas — Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F7F7F5;--surface:#FFFFFF;--surface2:#F0EFE9;
  --border:#E5E4DE;--border2:#D0CFCA;
  --text:#1A1A18;--text2:#6B6B67;--text3:#9E9E9A;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#B5D4F4;
  --green:#3B6D11;--green-light:#EAF3DE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --coral:#993C1D;--coral-light:#FAECE7;
  --r:8px;--r-lg:12px;--r-xl:16px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

.app{display:flex;min-height:100vh}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:18px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-mark{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.sidebar-logo span{font-weight:600;font-size:15px}
.sidebar-section{padding:16px 10px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s;margin:1px 6px;position:relative}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:500}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-item .badge-count{margin-left:auto;background:var(--surface2);color:var(--text3);font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500}
.nav-item .badge-count.unread{background:var(--red);color:#fff}
.sidebar-divider{height:1px;background:var(--border);margin:8px 12px}
.proj-item{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);margin:1px 6px;transition:all .12s}
.proj-item:hover{background:var(--surface2);color:var(--text)}
.proj-item.active{background:var(--surface2);color:var(--text);font-weight:500}
.proj-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.add-btn-sm{display:flex;align-items:center;gap:7px;padding:6px 10px;margin:4px 6px;border-radius:var(--r);font-size:12px;color:var(--text3);cursor:pointer;transition:color .12s}
.add-btn-sm:hover{color:var(--blue)}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar h1{font-size:16px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn{padding:6px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:13px;color:var(--text);display:inline-flex;align-items:center;gap:6px;font-weight:500;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#0C447C;border-color:#0C447C}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{color:var(--red);border-color:#F09595}
.btn-danger:hover{background:var(--red-light)}
.view-tabs{display:flex;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);display:inline-flex;align-items:center;gap:6px;font-weight:500;transition:all .12s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.content-area{flex:1;padding:24px;overflow-y:auto}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:16px 18px}
.stat-card .sc-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.stat-card .sc-value{font-size:28px;font-weight:600;line-height:1}
.stat-card .sc-sub{font-size:12px;color:var(--text2);margin-top:4px}
.stat-card.accent-blue{border-top:3px solid var(--blue)}
.stat-card.accent-green{border-top:3px solid #3B6D11}
.stat-card.accent-red{border-top:3px solid var(--red)}
.stat-card.accent-amber{border-top:3px solid #BA7517}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:18px}
.chart-card h3{font-size:13px;font-weight:600;margin-bottom:14px}
.chart-card canvas{max-height:200px}
.recent-section{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden}
.recent-section .rs-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.recent-section .rs-header h3{font-size:13px;font-weight:600}

.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar input[type=text]{padding:7px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);font-size:13px;color:var(--text);width:210px;outline:none;transition:border-color .12s}
.filter-bar input[type=text]:focus{border-color:var(--blue)}
.filter-bar select{padding:7px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);font-size:13px;color:var(--text);outline:none;cursor:pointer}
.table-wrap{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden}
.task-table{width:100%;border-collapse:collapse}
.task-table th{padding:9px 12px;font-size:11px;font-weight:600;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px;background:var(--surface2)}
.task-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.task-table tr:last-child td{border-bottom:none}
.task-table tbody tr{transition:background .1s;cursor:pointer}
.task-table tbody tr:hover{background:#FAFAF8}
.section-row td{background:var(--surface2);font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:6px 12px}
.section-row:hover td{background:var(--surface2)!important}
.cb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.cb:hover{border-color:var(--blue)}
.cb.done{background:var(--blue);border-color:var(--blue);color:#fff}
.task-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.task-title.done-text{text-decoration:line-through;color:var(--text3)}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;white-space:nowrap}
.b-alta{background:var(--coral-light);color:var(--coral)}
.b-media{background:var(--amber-light);color:var(--amber)}
.b-baja{background:var(--green-light);color:var(--green)}
.b-todo{background:var(--surface2);color:var(--text2)}
.b-prog{background:var(--blue-light);color:var(--blue)}
.b-done{background:var(--green-light);color:var(--green)}
.b-block{background:var(--red-light);color:var(--red)}
.b-tipo-pago{background:#EDE9FE;color:#5B21B6}
.b-tipo-impuesto{background:#FEF3C7;color:#92400E}
.b-tipo-informe{background:#E0F2FE;color:#0369A1}
.b-tipo-nomina{background:#FCE7F3;color:#9D174D}

.avatar{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.due-red{color:var(--red);font-weight:500}

.kanban-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
.k-col{background:var(--surface2);border-radius:var(--r-lg);padding:12px;min-height:200px}
.k-col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.k-title{font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}
.k-dot{width:8px;height:8px;border-radius:50%}
.k-count{font-size:11px;background:var(--surface);color:var(--text3);padding:1px 7px;border-radius:10px;border:1px solid var(--border)}
.k-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:11px 12px;margin-bottom:8px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.k-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.k-card-title{font-size:13px;font-weight:500;margin-bottom:7px;line-height:1.3}
.k-card-proj{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px;margin-bottom:8px}
.k-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.k-card-due{font-size:11px;color:var(--text3)}
.k-card-due.overdue{color:var(--red);font-weight:500}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:6px 0;text-transform:uppercase;letter-spacing:.4px}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);min-height:80px;padding:6px}
.cal-cell.today{border-color:var(--blue);border-width:2px}
.cal-cell .day-num{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.today .day-num{background:var(--blue);color:#fff}
.cal-event{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;cursor:pointer}

.notif-panel{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden}
.notif-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-header h3{font-size:13px;font-weight:600}
.notif-list{max-height:500px;overflow-y:auto}
.notif-item{display:flex;align-items:flex-start;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative}
.notif-item:hover{background:#FAFAF8}
.notif-item.unread{background:var(--blue-light)}
.notif-item.unread:hover{background:#D6E8F8}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:6px}
.notif-dot.read{background:var(--border2)}
.notif-content{flex:1;min-width:0}
.notif-title{font-size:13px;font-weight:500;margin-bottom:2px}
.notif-desc{font-size:12px;color:var(--text2);line-height:1.4}
.notif-meta{font-size:11px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:8px}
.notif-time{font-size:11px;color:var(--text3);white-space:nowrap}
.notif-empty{padding:40px;text-align:center;color:var(--text3);font-size:13px}
.notif-empty i{font-size:32px;margin-bottom:8px;display:block;color:var(--border2)}

.my-tasks-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.my-tasks-header h2{font-size:18px;font-weight:600}
.task-priority-group{margin-bottom:20px}
.task-priority-group h4{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:6px}

.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--r-xl);border:1px solid var(--border);padding:24px;width:580px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-h h2{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;display:flex}
.modal-close:hover{color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-grid.full{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);font-size:13px;color:var(--text);outline:none;transition:border-color .12s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg textarea{min-height:72px;resize:vertical;line-height:1.5}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

.assignee-pills{display:flex;flex-wrap:wrap;gap:4px;padding:6px 8px;border:1px solid var(--border2);border-radius:var(--r);min-height:38px;cursor:text;transition:border-color .12s;background:var(--surface)}
.assignee-pills:focus-within{border-color:var(--blue)}
.a-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:500}
.a-pill .rp{cursor:pointer;opacity:.6;font-size:14px;line-height:1;display:flex}
.a-pill .rp:hover{opacity:1}
.pill-input{border:none;outline:none;font-size:13px;background:transparent;font-family:inherit;min-width:80px;flex:1}

.mention-dropdown{position:fixed;background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-lg);box-shadow:var(--shadow-md);z-index:300;min-width:240px;overflow:hidden}
.mention-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background .1s;font-size:13px}
.mention-item:hover{background:var(--blue-light)}
.mention-item .m-email{font-size:11px;color:var(--text3)}

.team-member-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.team-member-row:last-child{border-bottom:none}
.team-member-row:hover{background:var(--surface2)}
.tm-info{flex:1;min-width:0}
.tm-name{font-size:13px;font-weight:500}
.tm-email{font-size:11px;color:var(--text3)}
.tm-actions{display:flex;gap:4px}

.gcal-box{background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:var(--r);padding:12px;display:flex;align-items:center;gap:12px;margin-top:8px}
.gcal-icon{width:32px;height:32px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#EA4335;border:1px solid var(--blue-mid);flex-shrink:0}
.gcal-text{flex:1}
.gcal-text strong{font-size:13px;font-weight:600;color:var(--blue);display:block;margin-bottom:1px}
.gcal-text span{font-size:12px;color:#378ADD}

.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--r-lg);font-size:13px;font-weight:500;z-index:500;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.user-selector{padding:4px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);font-size:13px;color:var(--text);cursor:pointer;outline:none}
.user-selector:hover{border-color:var(--blue)}

.activity-log{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:16px}
.activity-log h3{font-size:13px;font-weight:600;margin-bottom:12px}
.activity-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.activity-item:last-child{border-bottom:none}
.activity-item strong{color:var(--text);font-weight:500}
.activity-time{font-size:11px;color:var(--text3);white-space:nowrap}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

@media(max-width:768px){.sidebar{display:none}.stats-row{grid-template-columns:1fr 1fr}.charts-row{grid-template-columns:1fr}.kanban-grid{grid-template-columns:1fr 1fr}}
@media(max-width:500px){.stats-row{grid-template-columns:1fr}.kanban-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><i class="ti ti-chart-line"></i></div>
      <span>MV Finanzas</span>
    </div>
    <div class="sidebar-section">Vistas</div>
    <div class="nav-item active" onclick="setView('dashboard')" id="nav-dashboard"><i class="ti ti-chart-pie-2"></i> Dashboard</div>
    <div class="nav-item" onclick="setView('list')" id="nav-list"><i class="ti ti-layout-list"></i> Tareas y entregas</div>
    <div class="nav-item" onclick="setView('kanban')" id="nav-kanban"><i class="ti ti-layout-kanban"></i> Tablero</div>
    <div class="nav-item" onclick="setView('calendar')" id="nav-calendar"><i class="ti ti-calendar-event"></i> Calendario</div>
    <div class="nav-item" onclick="setView('inbox')" id="nav-inbox"><i class="ti ti-bell"></i> Bandeja<span class="badge-count" id="inbox-badge">0</span></div>
    <div class="nav-item" onclick="setView('mytasks')" id="nav-mytasks"><i class="ti ti-user-check"></i> Mis tareas</div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">Clientes</div>
    <div id="sidebar-projects"></div>
    <div class="add-btn-sm" onclick="openAddProject()"><i class="ti ti-plus" style="font-size:14px"></i> Nuevo cliente</div>
    <div style="flex:1"></div>
    <div style="padding:12px 14px;border-top:1px solid var(--border)">
      <div style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Equipo</div>
      <div id="sidebar-team"></div>
      <div class="add-btn-sm" style="margin:6px 0 0" onclick="openTeamManager()"><i class="ti ti-users" style="font-size:14px"></i> Gestionar equipo</div>
    </div>
    <div style="padding:10px 12px;border-top:1px solid var(--border)">
      <button class="btn btn-sm" style="width:100%;justify-content:center" onclick="openGcalBulk()">
        <i class="ti ti-brand-google" style="color:#EA4335"></i> Google Calendar
      </button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left"><h1 id="page-title">Dashboard</h1></div>
      <div class="topbar-right">
        <select class="user-selector" id="current-user-select" onchange="changeCurrentUser(this.value)">
          <option value="">Ver como admin</option>
        </select>
        <button class="btn btn-sm" onclick="openTeamManager()"><i class="ti ti-users"></i> Equipo</button>
        <button class="btn btn-sm" onclick="openGcalBulk()"><i class="ti ti-brand-google" style="color:#EA4335"></i> Cal</button>
        <button class="btn btn-sm btn-primary" onclick="openAddTask()"><i class="ti ti-plus"></i> Nueva tarea</button>
      </div>
    </div>
    <div class="view-tabs">
      <div class="tab active" id="tab-dashboard" onclick="setView('dashboard')"><i class="ti ti-chart-pie-2"></i> Dashboard</div>
      <div class="tab" id="tab-list" onclick="setView('list')"><i class="ti ti-list"></i> Lista</div>
      <div class="tab" id="tab-kanban" onclick="setView('kanban')"><i class="ti ti-layout-kanban"></i> Tablero</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════════
const SK = {

function save(key, val){ try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){} }
function load(key, fallback){ try{ const v=localStorage.getItem(key); return v!=null?JSON.parse(v):fallback; }catch(e){ return fallback; } }

// ═══════════════════════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════════════════════

  {id:2,name:'Informe financiero Q2',project:1,assignees:['Jesuina Silvestre','Adela Espinal'],priority:'alta',status:'pendiente',due:'2025-07-05',tipo:'Informe financiero',desc:'Análisis de estados financieros del segundo trimestre.',created:'2025-06-05',createdBy:'Manuel Vilchez'},
  {id:3,name:'Nómina quincenal',project:2,assignees:['Adela Espinal'],priority:'media',status:'en progreso',due:'2025-06-28',tipo:'Nómina',desc:'',created:'2025-06-10',createdBy:'Adela Espinal'},

// ═══════════════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════════════
let TEAM       = load(SK.team,       DEFAULT_TEAM);
let projects   = load(SK.projects,   DEFAULT_PROJECTS);
let tasks      = load(SK.tasks,      DEFAULT_TASKS);
let nextId     = load(SK.nextId,     10);
let notifs     = load(SK.notifs,     []);
let nextNotifId= load(SK.notifId,    1);
let currentUser= load(SK.currentUser, '');
let activityLog= load(SK.activity,   []);

function persist(){
  save(SK.team,        TEAM);
  save(SK.projects,    projects);
  save(SK.tasks,       tasks);
  save(SK.nextId,      nextId);
  save(SK.notifs,      notifs);
  save(SK.notifId,     nextNotifId);
  save(SK.currentUser, currentUser);
  save(SK.activity,    activityLog);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════════════════════
function createNotification(type, title, message, taskId, recipients, data={}){
  const now = new Date().toISOString();
  recipients.forEach(recipient => {
    if(!recipient) return;
    const notif = {
      id: nextNotifId++,
      type: type,
      title: title,
      message: message,
      taskId: taskId,
      recipient: recipient,
      read: false,
      created: now,
      data: data
    };
    notifs.push(notif);
  });
  save(SK.notifs, notifs);
  save(SK.notifId, nextNotifId);
  updateInboxBadges();
}

function getUnreadCount(userName){
  if(!userName) return 0;
  return notifs.filter(n => n.recipient === userName && !n.read).length;
}

function getUserNotifications(userName){
  if(!userName) return [];
  return notifs.filter(n => n.recipient === userName).sort((a,b) => new Date(b.created) - new Date(a.created));
}

function markNotifRead(id){
  const n = notifs.find(x => x.id === id);
  if(n){ n.read = true; save(SK.notifs, notifs); updateInboxBadges(); }
}

function markAllRead(userName){
  notifs.forEach(n => { if(n.recipient === userName) n.read = true; });
  save(SK.notifs, notifs);
  updateInboxBadges();
}

function updateInboxBadges(){
  const count = getUnreadCount(currentUser);
  const badge = document.getElementById('inbox-badge');
  const tabBadge = document.getElementById('tab-inbox-badge');
  if(badge){ badge.textContent = count; badge.classList.toggle('unread', count > 0); }
  if(tabBadge){ tabBadge.textContent = count; tabBadge.style.display = count > 0 ? 'inline-flex' : 'none'; }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  ACTIVITY LOG
// ═══════════════════════════════════════════════════════════════════════════════
function logActivity(action, taskName, details, user){
  const entry = {
    id: Date.now(),
    action: action,
    taskName: taskName,
    details: details,
    user: user || currentUser || 'Sistema',
    timestamp: new Date().toISOString()
  };
  activityLog.unshift(entry);
  if(activityLog.length > 100) activityLog = activityLog.slice(0, 100);
  save(SK.activity, activityLog);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
const PROJ_COLORS=['#185FA5','#0F6E56','#993C1D','#534AB7','#854F0B','#3B6D11','#993556','#0C447C'];
const TASK_TYPES=['Pago de servicio','Impuesto/DGII','Informe financiero','Nómina','Análisis','Otro'];
const MEMBER_COLORS=[
  {bg:'#E6F1FB',color:'#185FA5'},{bg:'#E1F5EE',color:'#0F6E56'},{bg:'#EEEDFE',color:'#534AB7'},
  {bg:'#FAEEDA',color:'#854F0B'},{bg:'#FCE7F3',color:'#9D174D'},{bg:'#FEF3C7',color:'#92400E'},
  {bg:'#E0F2FE',color:'#0369A1'},{bg:'#FAECE7',color:'#993C1D'},
];

function memberByName(n){ return TEAM.find(m=>m.name===n)||null; }
function initials(name){ return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function proj(id){ return projects.find(p=>p.id===id)||{name:'Sin cliente',color:'#888'}; }
function fmtDate(d){ if(!d)return'—'; const dt=new Date(d+'T12:00:00'); return dt.toLocaleDateString('es-DO',{day:'numeric',month:'short',year:'2-digit'}); }
function fmtDateTime(iso){ if(!iso)return''; const dt=new Date(iso); return dt.toLocaleDateString('es-DO',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
function isOverdue(d,s){ if(!d||s==='completado')return false; const today = new Date(); today.setHours(0,0,0,0); return new Date(d) < today; }
function priorityClass(p){ return p==='alta'?'b-alta':p==='media'?'b-media':'b-baja'; }
function statusClass(s){ return s==='completado'?'b-done':s==='en progreso'?'b-prog':s==='bloqueado'?'b-block':'b-todo'; }
function statusLabel(s){ return{pendiente:'Pendiente','en progreso':'En progreso',completado:'Completado',bloqueado:'Bloqueado'}[s]||s; }
function tipoClass(t){
  if(t==='Pago de servicio')return'b-tipo-pago';
  if(t==='Impuesto/DGII')return'b-tipo-impuesto';
  if(t==='Informe financiero')return'b-tipo-informe';
  if(t==='Nómina')return'b-tipo-nomina';
  return'b-todo';
}
function avatarEl(name, size=26){
  const m=memberByName(name);
  const bg=m?m.bg:'#F0EFE9', cl=m?m.color:'#6B6B67', ini=m?m.initials:initials(name);
  return`<span class="avatar" style="background:${bg};color:${cl};width:${size}px;height:${size}px;font-size:${size>28?12:10}px" title="${name}">${ini}</span>`;
}
function buildGCalUrl(title,date,desc,emails){
  const d=date.replace(/-/g,'');
  const nx=new Date(date+'T12:00:00'); nx.setDate(nx.getDate()+1);
  const nd=nx.toISOString().slice(0,10).replace(/-/g,'');
  const g=emails&&emails.length?'&add='+emails.join(','):'';
  return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${d}/${nd}&details=${encodeURIComponent(desc||'')}${g}`;
}
function assigneeEmails(names){ return (names||[]).map(n=>{ const m=memberByName(n); return m?m.email:null; }).filter(Boolean); }

function showToast(msg, icon='ti-check'){
  const existing=document.querySelector('.toast'); if(existing)existing.remove();
  const t=document.createElement('div'); t.className='toast';
  t.innerHTML=`<i class="ti ${icon}"></i> ${msg}`;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
}

function timeAgo(iso){
  if(!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  const hours = Math.floor(diff / 3600000);
  const days = Math.floor(diff / 86400000);
  if(mins < 1) return 'Ahora';
  if(mins < 60) return `Hace ${mins} min`;
  if(hours < 24) return `Hace ${hours} h`;
  if(days < 7) return `Hace ${days} d`;
  return fmtDateTime(iso);
}

// ═══════════════════════════════════════════════════════════════════════════════

function changeCurrentUser(userName){
  currentUser = userName;

function populateUserSelector(){
  const sel = document.getElementById('current-user-select');
  if(!sel) return;
  sel.innerHTML = `<option value="">Ver como administrador</option>` + 
    TEAM.map(m => `<option value="${m.name}" ${currentUser===m.name?'selected':''}>${m.name}</option>`).join('');

// ═══════════════════════════════════════════════════════════════════════════════
//  ROUTING
// ═══════════════════════════════════════════════════════════════════════════════
let currentView='dashboard', filterText='', filterProj='all', filterAssignee='all';
let chartInstances={};

function setView(v){
  currentView=v;
  const titles={dashboard:'Dashboard',list:'Tareas y entregas',kanban:'Tablero',calendar:'Calendario',inbox:'Bandeja de entrada',mytasks:'Mis tareas'};
  document.getElementById('page-title').textContent=titles[v]||v;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  const n=document.getElementById('nav-'+v); if(n)n.classList.add('active');
  const t=document.getElementById('tab-'+v); if(t)t.classList.add('active');
  Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch(e){}});
  chartInstances={};
  render();
}

function render(){
  renderSidebar();
  populateUserSelector();
  updateInboxBadges();
  const area=document.getElementById('content-area');
  if(currentView==='dashboard'){ area.innerHTML=renderDashboard(); initDashboardCharts(); }
  else if(currentView==='list') area.innerHTML=renderList();
  else if(currentView==='kanban') area.innerHTML=renderKanban();
  else if(currentView==='calendar') area.innerHTML=renderCalendar();
  else if(currentView==='inbox') area.innerHTML=renderInbox();
  else if(currentView==='mytasks') area.innerHTML=renderMyTasks();
}

// ═══════════════════════════════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════════════════════════════
function renderDashboard(){
  const total=tasks.length, done=tasks.filter(t=>t.status==='completado').length;
  const inprog=tasks.filter(t=>t.status==='en progreso').length, overdue=tasks.filter(t=>isOverdue(t.due,t.status)).length;
  const soon=tasks.filter(t=>t.status!=='completado'&&t.due).slice().sort((a,b)=>new Date(a.due)-new Date(b.due)).slice(0,5);
  const recentActivity = activityLog.slice(0, 8);
  
  return`
  <div class="stats-row">
    <div class="stat-card accent-blue"><div class="sc-label"><i class="ti ti-briefcase" style="font-size:13px"></i> Total entregas</div><div class="sc-value">${total}</div><div class="sc-sub">${projects.length} clientes</div></div>
    <div class="stat-card accent-green"><div class="sc-label"><i class="ti ti-circle-check" style="font-size:13px"></i> Completadas</div><div class="sc-value">${done}</div><div class="sc-sub">${total?Math.round(done/total*100):0}% del total</div></div>
    <div class="stat-card accent-amber"><div class="sc-label"><i class="ti ti-loader-2" style="font-size:13px"></i> En progreso</div><div class="sc-value">${inprog}</div><div class="sc-sub">${tasks.filter(t=>t.status==='bloqueado').length} bloqueadas</div></div>
    <div class="stat-card accent-red"><div class="sc-label"><i class="ti ti-alert-triangle" style="font-size:13px"></i> Vencidas</div><div class="sc-value">${overdue}</div><div class="sc-sub">Requieren atención</div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><h3>Estado de entregas</h3><canvas id="chart-status"></canvas></div>
    <div class="chart-card"><h3>Por cliente</h3><canvas id="chart-projects"></canvas></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
    <div class="chart-card"><h3>Por tipo</h3><canvas id="chart-tipo"></canvas></div>
    <div class="chart-card"><h3>Carga por responsable</h3><canvas id="chart-assignee"></canvas></div>
  </div>
  <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px">
    <div class="recent-section">
      <div class="rs-header"><h3>Próximas fechas límite</h3><button class="btn btn-sm" onclick="setView('list')">Ver todas <i class="ti ti-arrow-right"></i></button></div>
      <table class="task-table"><thead><tr>
        <th style="width:36px"></th><th>Tarea</th><th>Cliente</th><th>Responsable(s)</th><th>Tipo</th><th>Fecha límite</th><th>Estado</th>
      </tr></thead><tbody>
        ${soon.map(t=>`<tr onclick="openEditTask(${t.id})">
          <td><span class="cb ${t.status==='completado'?'done':''}" onclick="event.stopPropagation();toggleDone(${t.id})">${t.status==='completado'?'<i class="ti ti-check" style="font-size:11px"></i>':''}</span></td>
          <td><span class="task-title ${t.status==='completado'?'done-text':''}">${t.name}</span></td>
          <td><span style="display:inline-flex;align-items:center;gap:5px;font-size:12px"><span class="proj-dot" style="background:${proj(t.project).color}"></span>${proj(t.project).name}</span></td>
          <td><div style="display:flex;gap:3px">${(t.assignees||[]).map(a=>avatarEl(a)).join('')}</div></td>
          <td><span class="badge ${tipoClass(t.tipo)}">${t.tipo||'—'}</span></td>
          <td class="${isOverdue(t.due,t.status)?'due-red':''}">${fmtDate(t.due)}</td>
          <td><span class="badge ${statusClass(t.status)}">${statusLabel(t.status)}</span></td>
        </tr>`).join('')}
      </tbody></table>
    </div>
    <div class="activity-log">
      <h3><i class="ti ti-clock" style="margin-right:4px"></i>Actividad reciente</h3>
      ${recentActivity.length ? recentActivity.map(a => `
        <div class="activity-item">
          <div style="flex:1">
            <strong>${a.user}</strong> ${a.action} <strong>${a.taskName}</strong>
            ${a.details ? `<div style="color:var(--text3);margin-top:2px">${a.details}</div>` : ''}
          </div>
          <span class="activity-time">${timeAgo(a.timestamp)}</span>
        </div>
      `).join('') : '<div style="padding:12px 0;color:var(--text3);font-size:12px">Sin actividad reciente</div>'}
    </div>
  </div>`;
}

function initDashboardCharts(){
  const sd={pendiente:0,'en progreso':0,completado:0,bloqueado:0};
  tasks.forEach(t=>{if(sd[t.status]!==undefined)sd[t.status]++;});
  const pd={};projects.forEach(p=>pd[p.name]=0);tasks.forEach(t=>{const p=proj(t.project);if(pd[p.name]!==undefined)pd[p.name]++;});
  const td={};TASK_TYPES.forEach(tp=>td[tp]=0);tasks.forEach(t=>{if(t.tipo&&td[t.tipo]!==undefined)td[t.tipo]++;});
  const ad={};tasks.forEach(t=>(t.assignees||[]).forEach(a=>{ad[a]=(ad[a]||0)+1;}));
  const opts={responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:14,font:{size:11,family:'Inter'}}}}};
  const sc=document.getElementById('chart-status');
  if(sc)chartInstances.s=new Chart(sc,{type:'doughnut',data:{labels:['Pendiente','En progreso','Completado','Bloqueado'],datasets:[{data:Object.values(sd),backgroundColor:['#D3D1C7','#B5D4F4','#C0DD97','#F7C1C1'],borderWidth:0}]},options:{...opts,cutout:'65%'}});
  const pc=document.getElementById('chart-projects');
  if(pc)chartInstances.p=new Chart(pc,{type:'bar',data:{labels:Object.keys(pd),datasets:[{data:Object.values(pd),backgroundColor:projects.map(p=>p.color+'CC'),borderRadius:6,borderWidth:0}]},options:{...opts,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}},grid:{color:'#F0EFE9'}},x:{ticks:{font:{size:11}},grid:{display:false}}}}}});
  const tc=document.getElementById('chart-tipo');
  if(tc)chartInstances.t=new Chart(tc,{type:'doughnut',data:{labels:Object.keys(td).filter(k=>td[k]>0),datasets:[{data:Object.values(td).filter(v=>v>0),backgroundColor:['#C4B5FD','#FDE68A','#BAE6FD','#FBCFE8','#A7F3D0','#FED7AA'],borderWidth:0}]},options:{...opts,cutout:'65%'}});
  const ac=document.getElementById('chart-assignee');
  if(ac)chartInstances.a=new Chart(ac,{type:'bar',data:{labels:Object.keys(ad).map(n=>n.split(' ')[0]),datasets:[{data:Object.values(ad),backgroundColor:Object.keys(ad).map(n=>{const m=memberByName(n);return m?m.bg:'#E0E0E0';}),borderRadius:6,borderWidth:0}]},options:{...opts,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}},grid:{color:'#F0EFE9'}},y:{ticks:{font:{size:11}},grid:{display:false}}}}}});
}

    return `<div class="notif-panel">
      <div class="notif-header"><h3><i class="ti ti-bell" style="margin-right:6px"></i>Bandeja de entrada</h3></div>
      <div class="notif-empty">
        <i class="ti ti-user"></i>
        Selecciona un usuario desde el selector en la parte superior derecha para ver tus notificaciones.
      </div>
    </div>`;
  }
  
  const userNotifs = getUserNotifications(currentUser);
  const unread = userNotifs.filter(n => !n.read);
  
  return `<div class="notif-panel">
    <div class="notif-header">
      <h3><i class="ti ti-bell" style="margin-right:6px"></i>Bandeja — ${currentUser.split(' ')[0]}</h3>
      <div style="display:flex;gap:8px">
        ${unread.length > 0 ? `<button class="btn btn-sm" onclick="markAllRead('${currentUser}');render()"><i class="ti ti-checks"></i> Marcar todo leído</button>` : ''}
        <span style="font-size:12px;color:var(--text3);display:flex;align-items:center">${unread.length} sin leer · ${userNotifs.length} total</span>
      </div>
    </div>
    <div class="notif-list">
      ${userNotifs.length === 0 ? `
        <div class="notif-empty">
          <i class="ti ti-inbox"></i>
          No tienes notificaciones. Las verás aquí cuando te asignen tareas o haya cambios importantes.
        </div>
      ` : userNotifs.map(n => {
        const task = tasks.find(t => t.id === n.taskId);
        const p = task ? proj(task.project) : null;
        return `
        <div class="notif-item ${n.read ? '' : 'unread'}" onclick="handleNotifClick(${n.id}, ${n.taskId})">
          <div class="notif-dot ${n.read ? 'read' : ''}"></div>
          <div class="notif-content">
            <div class="notif-title">${n.title}</div>
            <div class="notif-desc">${n.message}</div>
            <div class="notif-meta">
              ${p ? `<span style="display:inline-flex;align-items:center;gap:4px"><span class="proj-dot" style="background:${p.color}"></span>${p.name}</span>` : ''}
              <span class="notif-time">${timeAgo(n.created)}</span>
            </div>
          </div>
          ${!n.read ? '<span style="background:var(--blue);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;white-space:nowrap">Nuevo</span>' : ''}
        </div>
        `;
      }).join('')}
    </div>
  </div>`;
}

function handleNotifClick(notifId, taskId){
  markNotifRead(notifId);
  if(taskId){
    const task = tasks.find(t => t.id === taskId);
    if(task) openEditTask(taskId);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
//  MY TASKS
// ═══════════════════════════════════════════════════════════════════════════════
function renderMyTasks(){
  if(!currentUser){
    return `<div style="text-align:center;padding:60px 20px">
      <i class="ti ti-user" style="font-size:48px;color:var(--border2);margin-bottom:16px;display:block"></i>
      <h2 style="font-size:18px;font-weight:600;margin-bottom:8px">Selecciona tu usuario</h2>
      <p style="color:var(--text2);font-size:14px;margin-bottom:20px">Usa el selector arriba para ver tus tareas.</p>
      <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        ${TEAM.map(m => `<button class="btn" onclick="changeCurrentUser('${m.name}');render()">${avatarEl(m.name, 28)} ${m.name}</button>`).join('')}
      </div>
    </div>`;
  }
  
  const myTasks = tasks.filter(t => (t.assignees || []).includes(currentUser));
  const byStatus = {
    en_progreso: myTasks.filter(t => t.status === 'en progreso'),
    pendiente: myTasks.filter(t => t.status === 'pendiente'),
    bloqueado: myTasks.filter(t => t.status === 'bloqueado'),
    completado: myTasks.filter(t => t.status === 'completado')
  };
  
  const overdue = myTasks.filter(t => isOverdue(t.due, t.status));
  const dueSoon = myTasks.filter(t => {
    if(!t.due || t.status === 'completado') return false;
    const due = new Date(t.due);
    const today = new Date();
    const diff = Math.ceil((due - today) / 86400000);
    return diff >= 0 && diff <= 3;
  });
  
  return `
    <div class="my-tasks-header">
      ${avatarEl(currentUser, 40)}
      <div>
        <h2>Mis tareas — ${currentUser}</h2>
        <div style="font-size:12px;color:var(--text3)">${myTasks.length} asignadas · ${overdue.length} vencidas · ${dueSoon.length} próximas a vencer</div>
      </div>
    </div>
    
    ${overdue.length > 0 ? `
    <div style="background:var(--red-light);border:1px solid #F09595;border-radius:var(--r-lg);padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:10px">
      <i class="ti ti-alert-triangle" style="color:var(--red);font-size:18px"></i>
      <div style="font-size:13px;color:var(--red);font-weight:500">Tienes ${overdue.length} tarea${overdue.length!==1?'s':''} vencida${overdue.length!==1?'s':''}</div>
    </div>
    ` : ''}
    
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px">
      <div>
        <div class="task-priority-group">
          <h4><span class="k-dot" style="background:#185FA5"></span>En progreso (${byStatus.en_progreso.length})</h4>
          ${byStatus.en_progreso.map(t => renderMyTaskCard(t)).join('') || '<div style="color:var(--text3);font-size:12px;padding:8px 0">Sin tareas</div>'}
        </div>
        <div class="task-priority-group">
          <h4><span class="k-dot" style="background:#B4B2A9"></span>Pendientes (${byStatus.pendiente.length})</h4>
          ${byStatus.pendiente.map(t => renderMyTaskCard(t)).join('') || '<div style="color:var(--text3);font-size:12px;padding:8px 0">Sin tareas</div>'}
        </div>
      </div>
      <div>
        <div class="task-priority-group">
          <h4><span class="k-dot" style="background:#E24B4A"></span>Bloqueadas (${byStatus.bloqueado.length})</h4>
          ${byStatus.bloqueado.map(t => renderMyTaskCard(t)).join('') || '<div style="color:var(--text3);font-size:12px;padding:8px 0">Sin tareas</div>'}
        </div>
        <div class="task-priority-group">
          <h4><span class="k-dot" style="background:#639922"></span>Completadas (${byStatus.completado.length})</h4>
          ${byStatus.completado.slice(-5).map(t => renderMyTaskCard(t)).join('') || '<div style="color:var(--text3);font-size:12px;padding:8px 0">Sin tareas</div>'}
        </div>
      </div>
    </div>
  `;
}

function renderMyTaskCard(t){
  const p = proj(t.project);
  const ov = isOverdue(t.due, t.status);
  return `
    <div class="k-card" onclick="openEditTask(${t.id})" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <span class="badge ${priorityClass(t.priority)}">${t.priority}</span>
        <span class="badge ${tipoClass(t.tipo)}">${t.tipo||'—'}</span>
      </div>
      <div class="k-card-title">${t.name}</div>
      <div class="k-card-proj"><span class="proj-dot" style="background:${p.color}"></span>${p.name}</div>
      <div class="k-card-foot">
        <div style="display:flex;gap:2px">${(t.assignees||[]).map(a => a !== currentUser ? avatarEl(a) : '').join('')}</div>
        <span class="k-card-due ${ov?'overdue':''}">${ov?'<i class="ti ti-alert-circle" style="font-size:10px"></i> ':''}${fmtDate(t.due)}</span>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════════════
//  LIST
// ═══════════════════════════════════════════════════════════════════════════════
function getFiltered(){
  return tasks.filter(t=>{
    if(filterText&&!t.name.toLowerCase().includes(filterText.toLowerCase()))return false;
    if(filterProj!=='all'&&t.project!=filterProj)return false;
    if(filterAssignee!=='all'&&!(t.assignees||[]).includes(filterAssignee))return false;
    return true;
  });
}
function renderList(){
  const ft=getFiltered();
  const grp={pendiente:[],en_progreso:[],bloqueado:[],completado:[]};
  ft.forEach(t=>{const k=t.status.replace(/ /g,'_');if(grp[k])grp[k].push(t);});
  const order=['en_progreso','bloqueado','pendiente','completado'];
  const names={pendiente:'Pendiente',en_progreso:'En progreso',bloqueado:'Bloqueado',completado:'Completado'};
  let html=`<div class="filter-bar">
    <input type="text" placeholder="Buscar..." value="${filterText}" oninput="filterText=this.value;render()">
    <select onchange="filterProj=this.value;render()">
      <option value="all">Todos los clientes</option>
      ${projects.map(p=>`<option value="${p.id}" ${filterProj==p.id?'selected':''}>${p.name}</option>`).join('')}
    </select>
    <select onchange="filterAssignee=this.value;render()">
      <option value="all">Todos los responsables</option>
      ${TEAM.map(m=>`<option ${filterAssignee===m.name?'selected':''}>${m.name}</option>`).join('')}
    </select>
    <span style="font-size:12px;color:var(--text3);margin-left:4px">${ft.length} tarea${ft.length!==1?'s':''}</span>
  </div>
  <div class="table-wrap"><table class="task-table">
    <thead><tr>
      <th style="width:36px"></th><th>Tarea / Entrega</th><th>Estado</th><th>Responsable(s)</th><th>Cliente</th><th>Tipo</th><th>Fecha límite</th><th style="width:36px"></th>
    </tr></thead><tbody>`;
  order.forEach(key=>{
    const list=grp[key]; if(!list||!list.length)return;
    html+=`<tr class="section-row"><td colspan="8">${names[key]} <span style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0 7px;font-size:10px;font-weight:600;color:var(--text3);margin-left:4px">${list.length}</span></td></tr>`;
    list.forEach(t=>{
      const p=proj(t.project), done=t.status==='completado';
      html+=`<tr onclick="openEditTask(${t.id})">
        <td><span class="cb ${done?'done':''}" onclick="event.stopPropagation();toggleDone(${t.id})">${done?'<i class="ti ti-check" style="font-size:11px"></i>':''}</span></td>
        <td><span class="task-title ${done?'done-text':''}">${t.name}</span></td>
        <td><span class="badge ${statusClass(t.status)}">${statusLabel(t.status)}</span></td>
        <td><div style="display:flex;align-items:center;gap:3px">${(t.assignees||[]).map(a=>avatarEl(a)).join('')}<<span style="font-size:11px;color:var(--text2);margin-left:4px">${(t.assignees||[]).map(a=>a.split(' ')[0]).join(', ')}</span></div></td>
        <td><span style="display:inline-flex;align-items:center;gap:5px;font-size:12px"><span class="proj-dot" style="background:${p.color}"></span>${p.name}</span></td>
        <td><span class="badge ${tipoClass(t.tipo)}">${t.tipo||'—'}</span></td>
        <td style="font-size:12px;${isOverdue(t.due,t.status)?'color:var(--red);font-weight:500':''}">${isOverdue(t.due,t.status)?'<i class="ti ti-alert-circle" style="font-size:12px"></i> ':''}${fmtDate(t.due)}</td>
        <td><button style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;display:flex;align-items:center;border-radius:4px;padding:3px" onclick="event.stopPropagation();deleteTask(${t.id})" title="Eliminar"><i class="ti ti-trash"></i></button></td>
      </tr>`;
    });
  });
  html+='</tbody></table></div>';
  return html;
}

// ═══════════════════════════════════════════════════════════════════════════════

  const dots={pendiente:'#B4B2A9','en progreso':'#185FA5',bloqueado:'#E24B4A',completado:'#639922'};
  return`<div class="kanban-grid">${cols.map(col=>{
    const ct=tasks.filter(t=>t.status===col);
    return`<div class="k-col">
      <div class="k-col-head"><div class="k-title"><span class="k-dot" style="background:${dots[col]}"></span>${titles[col]}</div><span class="k-count">${ct.length}</span></div>
      ${ct.map(t=>{
        const p=proj(t.project);
        return`<div class="k-card" onclick="openEditTask(${t.id})">
          <div class="k-card-title">${t.name}</div>
          <div class="k-card-proj"><span class="proj-dot" style="background:${p.color}"></span>${p.name}</div>
          <span class="badge ${tipoClass(t.tipo)}" style="font-size:10px">${t.tipo||'—'}</span>
          <div class="k-card-foot">
            <div style="display:flex;gap
