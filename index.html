<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace — Gestión de Proyectos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F7F7F5;--surface:#FFFFFF;--surface2:#F0EFE9;
  --border:#E5E4DE;--border2:#D0CFCA;
  --text:#1A1A18;--text2:#6B6B67;--text3:#9E9E9A;
  --blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#B5D4F4;
  --green:#3B6D11;--green-light:#EAF3DE;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;
  --purple:#534AB7;--purple-light:#EEEDFE;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --coral:#993C1D;--coral-light:#FAECE7;
  --r:8px;--r-lg:12px;--r-xl:16px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:18px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar-logo .logo-mark{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.sidebar-logo span{font-weight:600;font-size:15px}
.sidebar-section{padding:16px 10px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);transition:all .12s;margin:1px 6px}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--blue-light);color:var(--blue);font-weight:500}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-item .badge{margin-left:auto;background:var(--surface2);color:var(--text3);font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500}
.sidebar-divider{height:1px;background:var(--border);margin:8px 12px}
.proj-item{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);margin:1px 6px;transition:all .12s}
.proj-item:hover{background:var(--surface2);color:var(--text)}
.proj-item.active{background:var(--surface2);color:var(--text);font-weight:500}
.proj-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.proj-item .badge{margin-left:auto;font-size:10px;color:var(--text3)}
.add-btn-sm{display:flex;align-items:center;gap:7px;padding:6px 10px;margin:4px 6px;border-radius:var(--r);font-size:12px;color:var(--text3);cursor:pointer;transition:color .12s}
.add-btn-sm:hover{color:var(--blue)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar h1{font-size:16px;font-weight:600}
.breadcrumb{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:4px}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn{padding:6px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:13px;color:var(--text);display:inline-flex;align-items:center;gap:6px;font-weight:500;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#0C447C;border-color:#0C447C}
.btn-sm{padding:4px 10px;font-size:12px}
.view-tabs{display:flex;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border);gap:0}
.tab{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);display:inline-flex;align-items:center;gap:6px;font-weight:500;transition:all .12s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.content-area{flex:1;padding:24px;overflow-y:auto}

/* Dashboard */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:16px 18px}
.stat-card .sc-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.stat-card .sc-value{font-size:28px;font-weight:600;line-height:1}
.stat-card .sc-sub{font-size:12px;color:var(--text2);margin-top:4px}
.stat-card.accent-blue{border-top:3px solid var(--blue)}
.stat-card.accent-green{border-top:3px solid #3B6D11}
.stat-card.accent-red{border-top:3px solid var(--red)}
.stat-card.accent-amber{border-top:3px solid #BA7517}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);padding:18px}
.chart-card h3{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text)}
.chart-card canvas{max-height:200px}

.recent-section{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden}
.recent-section .rs-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.recent-section .rs-header h3{font-size:13px;font-weight:600}

/* Task list */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar input[type=text]{padding:7px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);font-size:13px;color:var(--text);width:210px;outline:none;transition:border-color .12s}
.filter-bar input[type=text]:focus{border-color:var(--blue)}
.filter-bar select{padding:7px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);font-size:13px;color:var(--text);outline:none;cursor:pointer}
.table-wrap{background:var(--surface);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden}
.task-table{width:100%;border-collapse:collapse}
.task-table th{padding:9px 12px;font-size:11px;font-weight:600;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px;background:var(--surface2)}
.task-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.task-table tr:last-child td{border-bottom:none}
.task-table tbody tr{transition:background .1s;cursor:pointer}
.task-table tbody tr:hover{background:#FAFAF8}
.task-name-cell{display:flex;align-items:center;gap:9px}
.cb{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.cb:hover{border-color:var(--blue)}
.cb.done{background:var(--blue);border-color:var(--blue);color:#fff}
.task-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.task-title.done-text{text-decoration:line-through;color:var(--text3)}
.section-row td{background:var(--surface2);font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;padding:6px 12px}
.section-row:hover td{background:var(--surface2) !important}
.section-toggle{cursor:pointer;display:flex;align-items:center;gap:6px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;white-space:nowrap}
.b-alta{background:var(--coral-light);color:var(--coral)}
.b-media{background:var(--amber-light);color:var(--amber)}
.b-baja{background:var(--green-light);color:var(--green)}
.b-todo{background:var(--surface2);color:var(--text2)}
.b-prog{background:var(--blue-light);color:var(--blue)}
.b-done{background:var(--green-light);color:var(--green)}
.b-block{background:var(--red-light);color:var(--red)}

/* Avatar */
.avatar{width:26px;height:26px;border-radius:50%;font-size:10px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.due-red{color:var(--red);font-weight:500}

/* Kanban */
.kanban-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
.k-col{background:var(--surface2);border-radius:var(--r-lg);padding:12px;min-height:200px}
.k-col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:2px 0}
.k-col-head .k-title{font-size:12px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px}
.k-col-head .k-dot{width:8px;height:8px;border-radius:50%}
.k-col-head .k-count{font-size:11px;background:var(--surface);color:var(--text3);padding:1px 7px;border-radius:10px;border:1px solid var(--border)}
.k-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:11px 12px;margin-bottom:8px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.k-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.k-card-title{font-size:13px;font-weight:500;margin-bottom:7px;line-height:1.3}
.k-card-proj{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:5px;margin-bottom:8px}
.k-card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.k-card-due{font-size:11px;color:var(--text3)}
.k-card-due.overdue{color:var(--red);font-weight:500}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:6px 0;text-transform:uppercase;letter-spacing:.4px}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);min-height:80px;padding:6px;cursor:default}
.cal-cell.today{border-color:var(--blue);border-width:2px}
.cal-cell .day-num{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:4px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cal-cell.today .day-num{background:var(--blue);color:#fff}
.cal-event{font-size:10px;padding:2px 5px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;cursor:pointer}

/* Modal */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--r-xl);border:1px solid var(--border);padding:24px;width:540px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-h h2{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:2px;line-height:1;display:flex}
.modal-close:hover{color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-grid.full{grid-template-columns:1fr}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);font-size:13px;color:var(--text);outline:none;transition:border-color .12s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg textarea{min-height:72px;resize:vertical;line-height:1.5}
.gcal-box{background:var(--blue-light);border:1px solid var(--blue-mid);border-radius:var(--r);padding:12px;display:flex;align-items:center;gap:12px;margin-top:8px}
.gcal-box .gcal-icon{width:32px;height:32px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#EA4335;border:1px solid var(--blue-mid);flex-shrink:0}
.gcal-box .gcal-text{flex:1}
.gcal-box .gcal-text strong{font-size:13px;font-weight:600;color:var(--blue);display:block;margin-bottom:1px}
.gcal-box .gcal-text span{font-size:12px;color:#378ADD}
.gcal-box input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--blue)}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-danger{color:var(--red);border-color:#F09595}
.btn-danger:hover{background:var(--red-light)}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .stats-row{grid-template-columns:1fr 1fr}
  .charts-row{grid-template-columns:1fr}
  .kanban-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:500px){
  .stats-row{grid-template-columns:1fr}
  .kanban-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark"><i class="ti ti-layout-dashboard"></i></div>
      <span>Workspace</span>
    </div>

    <div class="sidebar-section">Vistas</div>
    <div class="nav-item active" onclick="setView('dashboard')" id="nav-dashboard">
      <i class="ti ti-chart-pie-2"></i> Dashboard
    </div>
    <div class="nav-item" onclick="setView('list')" id="nav-list">
      <i class="ti ti-layout-list"></i> Lista de tareas
    </div>
    <div class="nav-item" onclick="setView('kanban')" id="nav-kanban">
      <i class="ti ti-layout-kanban"></i> Tablero
    </div>
    <div class="nav-item" onclick="setView('calendar')" id="nav-calendar">
      <i class="ti ti-calendar-event"></i> Calendario
    </div>

    <div class="sidebar-divider"></div>
    <div class="sidebar-section">Proyectos</div>
    <div id="sidebar-projects"></div>
    <div class="add-btn-sm" onclick="openAddProject()">
      <i class="ti ti-plus" style="font-size:14px"></i> Nuevo proyecto
    </div>

    <div style="flex:1"></div>
    <div style="padding:12px 16px;border-top:1px solid var(--border)">
      <button class="btn btn-sm" style="width:100%;justify-content:center" onclick="openGmailBulk()">
        <i class="ti ti-brand-google" style="color:#EA4335"></i> Exportar a Google Calendar
      </button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <h1 id="page-title">Dashboard</h1>
      </div>
      <div class="topbar-right">
        <button class="btn btn-sm" onclick="openGmailBulk()"><i class="ti ti-brand-google" style="color:#EA4335"></i> Google Calendar</button>
        <button class="btn btn-sm btn-primary" onclick="openAddTask()"><i class="ti ti-plus"></i> Nueva tarea</button>
      </div>
    </div>

    <div class="view-tabs">
      <div class="tab active" id="tab-dashboard" onclick="setView('dashboard')"><i class="ti ti-chart-pie-2"></i> Dashboard</div>
      <div class="tab" id="tab-list" onclick="setView('list')"><i class="ti ti-list"></i> Lista</div>
      <div class="tab" id="tab-kanban" onclick="setView('kanban')"><i class="ti ti-layout-kanban"></i> Tablero</div>
      <div class="tab" id="tab-calendar" onclick="setView('calendar')"><i class="ti ti-calendar-event"></i> Calendario</div>
    </div>

    <div class="content-area" id="content-area"></div>
  </div>
</div>

<div id="modal-root"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const PROJ_COLORS=['#185FA5','#0F6E56','#993C1D','#534AB7','#854F0B','#3B6D11','#993556','#0C447C'];
const MEMBERS=['Yo','Ana','Luis','María','Pedro','Carmen'];
const AVATAR_COLORS={
  'Yo':['#D3D1C7','#444441'],'Ana':['#E6F1FB','#185FA5'],'Luis':['#E1F5EE','#0F6E56'],
  'María':['#FAEEDA','#854F0B'],'Pedro':['#FAECE7','#993C1D'],'Carmen':['#EEEDFE','#534AB7']
};

let projects=[
  {id:1,name:'Web Rediseño',color:'#185FA5'},
  {id:2,name:'App Móvil',color:'#0F6E56'},
  {id:3,name:'Marketing Q3',color:'#993C1D'}
];
let tasks=[
  {id:1,name:'Diseño de wireframes',project:1,assignee:'Ana',priority:'alta',status:'en progreso',due:'2025-07-05',desc:'Crear wireframes para las páginas principales'},
  {id:2,name:'Revisión de copy del sitio',project:3,assignee:'María',priority:'media',status:'pendiente',due:'2025-07-10',desc:''},
  {id:3,name:'Setup API backend',project:2,assignee:'Luis',priority:'alta',status:'en progreso',due:'2025-06-28',desc:''},
  {id:4,name:'Testing en iOS',project:2,assignee:'Pedro',priority:'media',status:'pendiente',due:'2025-07-20',desc:''},
  {id:5,name:'Campaña redes sociales',project:3,assignee:'Carmen',priority:'baja',status:'pendiente',due:'2025-07-15',desc:''},
  {id:6,name:'Homepage HTML/CSS',project:1,assignee:'Yo',priority:'alta',status:'completado',due:'2025-06-20',desc:''},
  {id:7,name:'Integración de pagos',project:2,assignee:'Luis',priority:'alta',status:'bloqueado',due:'2025-06-25',desc:'Esperando credenciales de Stripe'},
  {id:8,name:'Estrategia SEO',project:3,assignee:'Ana',priority:'media',status:'pendiente',due:'2025-07-25',desc:''},
  {id:9,name:'Sistema de autenticación',project:1,assignee:'Luis',priority:'alta',status:'en progreso',due:'2025-07-08',desc:''},
];
let nextId=10;
let currentView='dashboard';
let filterText='';let filterProj='all';let filterAssignee='all';
let chartInstances={};

// ── Helpers ───────────────────────────────────────────────────────────────────
function proj(id){return projects.find(p=>p.id===id)||{name:'Sin proyecto',color:'#888'}}
function fmtDate(d){if(!d)return'—';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('es-DO',{day:'numeric',month:'short',year:'2-digit'})}
function isOverdue(d,status){if(!d||status==='completado')return false;return new Date(d)<new Date()}
function priorityClass(p){return p==='alta'?'b-alta':p==='media'?'b-media':'b-baja'}
function statusClass(s){return s==='completado'?'b-done':s==='en progreso'?'b-prog':s==='bloqueado'?'b-block':'b-todo'}
function statusLabel(s){return{pendiente:'Pendiente','en progreso':'En progreso',completado:'Completado',bloqueado:'Bloqueado'}[s]||s}
function avatarEl(name){
  const init=(name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const c=AVATAR_COLORS[name]||['#E1F5EE','#0F6E56'];
  return`<span class="avatar" style="background:${c[0]};color:${c[1]}" title="${name}">${init}</span>`;
}
function buildGCalUrl(title,date,desc){
  const d=date.replace(/-/g,'');
  const next=new Date(date+'T12:00:00');next.setDate(next.getDate()+1);
  const nd=next.toISOString().slice(0,10).replace(/-/g,'');
  return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${d}/${nd}&details=${encodeURIComponent(desc||'')}`;
}
function destroyCharts(){Object.values(chartInstances).forEach(c=>{try{c.destroy()}catch(e){}});chartInstances={}}

// ── Routing ───────────────────────────────────────────────────────────────────
function setView(v){
  currentView=v;
  const titles={dashboard:'Dashboard',list:'Lista de tareas',kanban:'Tablero',calendar:'Calendario'};
  document.getElementById('page-title').textContent=titles[v];
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  const n=document.getElementById('nav-'+v);if(n)n.classList.add('active');
  const t=document.getElementById('tab-'+v);if(t)t.classList.add('active');
  destroyCharts();
  render();
}
function render(){
  renderSidebar();
  const area=document.getElementById('content-area');
  if(currentView==='dashboard')area.innerHTML=renderDashboard();
  else if(currentView==='list')area.innerHTML=renderList();
  else if(currentView==='kanban')area.innerHTML=renderKanban();
  else area.innerHTML=renderCalendar();
  if(currentView==='dashboard')initDashboardCharts();
}

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar(){
  const c=document.getElementById('sidebar-projects');
  c.innerHTML=projects.map(p=>`
    <div class="proj-item ${filterProj==p.id?'active':''}" onclick="filterProj='${p.id}';setView('list')">
      <span class="proj-dot" style="background:${p.color}"></span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
      <span class="badge">${tasks.filter(t=>t.project===p.id).length}</span>
    </div>`).join('');
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard(){
  const total=tasks.length;
  const done=tasks.filter(t=>t.status==='completado').length;
  const inprog=tasks.filter(t=>t.status==='en progreso').length;
  const overdue=tasks.filter(t=>isOverdue(t.due,t.status)).length;
  const pct=total?Math.round(done/total*100):0;

  const recentTasks=tasks.slice().sort((a,b)=>a.due&&b.due?new Date(a.due)-new Date(b.due):0).slice(0,5);

  return`
  <div class="stats-row">
    <div class="stat-card accent-blue">
      <div class="sc-label"><i class="ti ti-list-check" style="font-size:13px"></i> Total tareas</div>
      <div class="sc-value">${total}</div>
      <div class="sc-sub">${projects.length} proyectos activos</div>
    </div>
    <div class="stat-card accent-green">
      <div class="sc-label"><i class="ti ti-circle-check" style="font-size:13px"></i> Completadas</div>
      <div class="sc-value">${done}</div>
      <div class="sc-sub">${pct}% del total</div>
    </div>
    <div class="stat-card accent-amber">
      <div class="sc-label"><i class="ti ti-loader-2" style="font-size:13px"></i> En progreso</div>
      <div class="sc-value">${inprog}</div>
      <div class="sc-sub">${tasks.filter(t=>t.status==='bloqueado').length} bloqueadas</div>
    </div>
    <div class="stat-card accent-red">
      <div class="sc-label"><i class="ti ti-alert-triangle" style="font-size:13px"></i> Vencidas</div>
      <div class="sc-value">${overdue}</div>
      <div class="sc-sub">Requieren atención</div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>Estado de tareas</h3>
      <canvas id="chart-status"></canvas>
    </div>
    <div class="chart-card">
      <h3>Tareas por proyecto</h3>
      <canvas id="chart-projects"></canvas>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
    <div class="chart-card">
      <h3>Distribución por prioridad</h3>
      <canvas id="chart-priority"></canvas>
    </div>
    <div class="chart-card">
      <h3>Carga por responsable</h3>
      <canvas id="chart-assignee"></canvas>
    </div>
  </div>

  <div class="recent-section">
    <div class="rs-header">
      <h3>Próximas fechas límite</h3>
      <button class="btn btn-sm" onclick="setView('list')">Ver todas <i class="ti ti-arrow-right"></i></button>
    </div>
    <table class="task-table">
      <thead><tr>
        <th style="width:36px"></th>
        <th>Tarea</th><th>Proyecto</th><th>Responsable</th><th>Prioridad</th><th>Fecha límite</th><th>Estado</th>
      </tr></thead>
      <tbody>
        ${recentTasks.map(t=>`
        <tr onclick="openEditTask(${t.id})" style="cursor:pointer">
          <td><span class="cb ${t.status==='completado'?'done':''}" onclick="event.stopPropagation();toggleDone(${t.id})">${t.status==='completado'?'<i class="ti ti-check" style="font-size:11px"></i>':''}</span></td>
          <td><div class="task-name-cell"><span class="task-title ${t.status==='completado'?'done-text':''}">${t.name}</span></div></td>
          <td><span style="display:inline-flex;align-items:center;gap:5px;font-size:12px"><span class="proj-dot" style="background:${proj(t.project).color}"></span>${proj(t.project).name}</span></td>
          <td>${avatarEl(t.assignee)}</td>
          <td><span class="badge ${priorityClass(t.priority)}">${t.priority}</span></td>
          <td class="${isOverdue(t.due,t.status)?'due-red':''}">${fmtDate(t.due)}</td>
          <td><span class="badge ${statusClass(t.status)}">${statusLabel(t.status)}</span></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function initDashboardCharts(){
  const statusData={pendiente:0,'en progreso':0,completado:0,bloqueado:0};
  tasks.forEach(t=>{if(statusData[t.status]!==undefined)statusData[t.status]++});

  const projData={};
  projects.forEach(p=>projData[p.name]=0);
  tasks.forEach(t=>{const p=proj(t.project);if(projData[p.name]!==undefined)projData[p.name]++});

  const priData={alta:0,media:0,baja:0};
  tasks.forEach(t=>priData[t.priority]=(priData[t.priority]||0)+1);

  const assigneeData={};
  tasks.forEach(t=>{assigneeData[t.assignee]=(assigneeData[t.assignee]||0)+1});

  const defaults={responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:14,font:{size:11,family:'Inter'}}}}};

  const sc=document.getElementById('chart-status');
  if(sc){chartInstances.status=new Chart(sc,{type:'doughnut',data:{
    labels:['Pendiente','En progreso','Completado','Bloqueado'],
    datasets:[{data:Object.values(statusData),backgroundColor:['#D3D1C7','#B5D4F4','#C0DD97','#F7C1C1'],borderWidth:0}]
  },options:{...defaults,cutout:'65%'}});}

  const pc=document.getElementById('chart-projects');
  if(pc){chartInstances.projects=new Chart(pc,{type:'bar',data:{
    labels:Object.keys(projData),
    datasets:[{data:Object.values(projData),backgroundColor:projects.map(p=>p.color+'CC'),borderRadius:6,borderWidth:0}]
  },options:{...defaults,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}},grid:{color:'#F0EFE9'}},x:{ticks:{font:{size:11}},grid:{display:false}}}}});}

  const prc=document.getElementById('chart-priority');
  if(prc){chartInstances.priority=new Chart(prc,{type:'doughnut',data:{
    labels:['Alta','Media','Baja'],
    datasets:[{data:Object.values(priData),backgroundColor:['#F09595','#FAC775','#97C459'],borderWidth:0}]
  },options:{...defaults,cutout:'65%'}});}

  const ac=document.getElementById('chart-assignee');
  if(ac){chartInstances.assignee=new Chart(ac,{type:'bar',data:{
    labels:Object.keys(assigneeData),
    datasets:[{data:Object.values(assigneeData),backgroundColor:'#B5D4F4',borderRadius:6,borderWidth:0}]
  },options:{...defaults,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1,font:{size:11}},grid:{color:'#F0EFE9'}},y:{ticks:{font:{size:11}},grid:{display:false}}}}});}
}

// ── List View ─────────────────────────────────────────────────────────────────
function getFiltered(){
  return tasks.filter(t=>{
    if(filterText&&!t.name.toLowerCase().includes(filterText.toLowerCase()))return false;
    if(filterProj!=='all'&&t.project!=filterProj)return false;
    if(filterAssignee!=='all'&&t.assignee!==filterAssignee)return false;
    return true;
  });
}
function renderList(){
  const ft=getFiltered();
  const groups={pendiente:[],en_progreso:[],bloqueado:[],completado:[]};
  ft.forEach(t=>{const k=t.status.replace(/ /g,'_');if(groups[k])groups[k].push(t);});
  const sOrder=['en_progreso','bloqueado','pendiente','completado'];
  const sNames={pendiente:'Pendiente',en_progreso:'En progreso',bloqueado:'Bloqueado',completado:'Completado'};

  let html=`<div class="filter-bar">
    <input type="text" placeholder="Buscar tarea..." value="${filterText}" oninput="filterText=this.value;render()">
    <select onchange="filterProj=this.value;render()">
      <option value="all">Todos los proyectos</option>
      ${projects.map(p=>`<option value="${p.id}" ${filterProj==p.id?'selected':''}>${p.name}</option>`).join('')}
    </select>
    <select onchange="filterAssignee=this.value;render()">
      <option value="all">Todos los responsables</option>
      ${MEMBERS.map(m=>`<option ${filterAssignee===m?'selected':''}>${m}</option>`).join('')}
    </select>
    <span style="font-size:12px;color:var(--text3);margin-left:4px">${ft.length} tarea${ft.length!==1?'s':''}</span>
  </div>
  <div class="table-wrap">
    <table class="task-table">
      <thead><tr>
        <th style="width:36px"></th>
        <th>Tarea</th><th>Estado</th><th>Responsable</th><th>Proyecto</th><th>Prioridad</th><th>Fecha límite</th><th style="width:36px"></th>
      </tr></thead>
      <tbody id="task-tbody">`;

  sOrder.forEach(key=>{
    const list=groups[key];
    if(!list||!list.length)return;
    html+=`<tr class="section-row"><td colspan="8"><div class="section-toggle">${sNames[key]} <span style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0 7px;font-size:10px;font-weight:600;color:var(--text3);margin-left:4px">${list.length}</span></div></td></tr>`;
    list.forEach(t=>{
      const p=proj(t.project);
      const done=t.status==='completado';
      html+=`<tr onclick="openEditTask(${t.id})">
        <td><span class="cb ${done?'done':''}" onclick="event.stopPropagation();toggleDone(${t.id})">${done?'<i class="ti ti-check" style="font-size:11px"></i>':''}</span></td>
        <td><div class="task-name-cell"><span class="task-title ${done?'done-text':''}">${t.name}</span></div></td>
        <td><span class="badge ${statusClass(t.status)}">${statusLabel(t.status)}</span></td>
        <td style="display:flex;align-items:center;gap:7px">${avatarEl(t.assignee)}<span style="font-size:12px">${t.assignee}</span></td>
        <td><span style="display:inline-flex;align-items:center;gap:5px;font-size:12px"><span class="proj-dot" style="background:${p.color}"></span>${p.name}</span></td>
        <td><span class="badge ${priorityClass(t.priority)}">${t.priority}</span></td>
        <td style="font-size:12px;${isOverdue(t.due,t.status)?'color:var(--red);font-weight:500':''}">${isOverdue(t.due,t.status)?'<i class="ti ti-alert-circle" style="font-size:12px"></i> ':''}${fmtDate(t.due)}</td>
        <td><button style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;display:flex;align-items:center;border-radius:4px;padding:3px" onclick="event.stopPropagation();deleteTask(${t.id})" title="Eliminar"><i class="ti ti-trash"></i></button></td>
      </tr>`;
    });
  });
  html+='</tbody></table></div>';
  return html;
}

// ── Kanban ────────────────────────────────────────────────────────────────────
function renderKanban(){
  const cols=['pendiente','en progreso','bloqueado','completado'];
  const titles={pendiente:'Pendiente','en progreso':'En progreso',bloqueado:'Bloqueado',completado:'Completado'};
  const dots={pendiente:'#B4B2A9','en progreso':'#185FA5',bloqueado:'#E24B4A',completado:'#639922'};
  let html=`<div class="kanban-grid">`;
  cols.forEach(col=>{
    const colTasks=tasks.filter(t=>t.status===col);
    html+=`<div class="k-col">
      <div class="k-col-head">
        <div class="k-title"><span class="k-dot" style="background:${dots[col]}"></span>${titles[col]}</div>
        <span class="k-count">${colTasks.length}</span>
      </div>`;
    colTasks.forEach(t=>{
      const p=proj(t.project);
      html+=`<div class="k-card" onclick="openEditTask(${t.id})">
        <div class="k-card-title">${t.name}</div>
        <div class="k-card-proj"><span class="proj-dot" style="background:${p.color}"></span>${p.name}</div>
        <span class="badge ${priorityClass(t.priority)}" style="font-size:10px">${t.priority}</span>
        <div class="k-card-foot">
          ${avatarEl(t.assignee)}
          <span class="k-card-due ${isOverdue(t.due,t.status)?'overdue':''}">${fmtDate(t.due)}</span>
        </div>
      </div>`;
    });
    html+=`<button class="btn btn-sm" style="width:100%;justify-content:center;margin-top:4px;border-style:dashed" onclick="openAddTask('${col}')"><i class="ti ti-plus"></i> Añadir tarea</button>
    </div>`;
  });
  html+='</div>';
  return html;
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function renderCalendar(){
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth();
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  let html=`<div style="max-width:900px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <h2 style="font-size:18px;font-weight:600">${months[m]} ${y}</h2>
      <button class="btn btn-sm" onclick="openAddTask()"><i class="ti ti-plus"></i> Nueva tarea</button>
    </div>
    <div class="cal-grid" style="margin-bottom:4px">
      ${days.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
    </div>
    <div class="cal-grid">`;
  for(let i=0;i<firstDay;i++)html+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=tasks.filter(t=>t.due===ds);
    const today=d===now.getDate();
    html+=`<div class="cal-cell ${today?'today':''}">
      <div class="day-num">${d}</div>
      ${dt.slice(0,3).map(t=>`<div class="cal-event" style="background:${proj(t.project).color}22;color:${proj(t.project).color}" onclick="openEditTask(${t.id})" title="${t.name}">${t.name}</div>`).join('')}
      ${dt.length>3?`<div style="font-size:9px;color:var(--text3)">+${dt.length-3} más</div>`:''}
    </div>`;
  }
  html+=`</div></div>`;
  return html;
}

// ── Actions ───────────────────────────────────────────────────────────────────
function toggleDone(id){
  const t=tasks.find(x=>x.id===id);
  if(t)t.status=t.status==='completado'?'pendiente':'completado';
  render();
}
function deleteTask(id){if(confirm('¿Eliminar esta tarea?')){tasks=tasks.filter(x=>x.id!==id);render();}}

// ── Modals ────────────────────────────────────────────────────────────────────
function openModal(html){
  document.getElementById('modal-root').innerHTML=`<div class="backdrop" onclick="if(event.target===this)closeModal()">${html}</div>`;
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function openAddTask(defStatus='pendiente'){
  openModal(`<div class="modal">
    <div class="modal-h">
      <h2>Nueva tarea</h2>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-grid full"><div class="fg"><label>Nombre de la tarea *</label><input id="f-name" placeholder="¿Qué hay que hacer?"></div></div>
    <div class="form-grid">
      <div class="fg"><label>Proyecto</label><select id="f-proj">${projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
      <div class="fg"><label>Responsable</label><select id="f-ass">${MEMBERS.map(m=>`<option>${m}</option>`).join('')}</select></div>
    </div>
    <div class="form-grid">
      <div class="fg"><label>Prioridad</label><select id="f-pri"><option value="alta">Alta</option><option value="media" selected>Media</option><option value="baja">Baja</option></select></div>
      <div class="fg"><label>Estado</label><select id="f-status">
        <option value="pendiente" ${defStatus==='pendiente'?'selected':''}>Pendiente</option>
        <option value="en progreso" ${defStatus==='en progreso'?'selected':''}>En progreso</option>
        <option value="bloqueado" ${defStatus==='bloqueado'?'selected':''}>Bloqueado</option>
        <option value="completado" ${defStatus==='completado'?'selected':''}>Completado</option>
      </select></div>
    </div>
    <div class="form-grid">
      <div class="fg"><label>Fecha inicio</label><input type="date" id="f-start"></div>
      <div class="fg"><label>Fecha límite</label><input type="date" id="f-due"></div>
    </div>
    <div class="form-grid full"><div class="fg"><label>Descripción / Notas</label><textarea id="f-desc" placeholder="Contexto, detalles, links..."></textarea></div></div>
    <div class="gcal-box">
      <div class="gcal-icon"><i class="ti ti-brand-google"></i></div>
      <div class="gcal-text">
        <strong>Agregar a Google Calendar</strong>
        <span>Se abrirá Google Calendar con los datos de la tarea</span>
      </div>
      <input type="checkbox" id="f-gcal">
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewTask()"><i class="ti ti-check"></i> Guardar tarea</button>
    </div>
  </div>`);
}

function saveNewTask(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').style.borderColor='var(--red)';return;}
  const gcal=document.getElementById('f-gcal').checked;
  const t={id:nextId++,name,project:parseInt(document.getElementById('f-proj').value),assignee:document.getElementById('f-ass').value,priority:document.getElementById('f-pri').value,status:document.getElementById('f-status').value,due:document.getElementById('f-due').value||null,desc:document.getElementById('f-desc').value};
  tasks.push(t);
  if(gcal&&t.due)window.open(buildGCalUrl(t.name,t.due,'Proyecto: '+proj(t.project).name+(t.desc?'\n'+t.desc:'')),'_blank');
  closeModal();render();
}

function openEditTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  openModal(`<div class="modal">
    <div class="modal-h">
      <h2>Editar tarea</h2>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-grid full"><div class="fg"><label>Nombre *</label><input id="e-name" value="${t.name.replace(/"/g,'&quot;')}"></div></div>
    <div class="form-grid">
      <div class="fg"><label>Proyecto</label><select id="e-proj">${projects.map(p=>`<option value="${p.id}" ${p.id===t.project?'selected':''}>${p.name}</option>`).join('')}</select></div>
      <div class="fg"><label>Responsable</label><select id="e-ass">${MEMBERS.map(m=>`<option ${m===t.assignee?'selected':''}>${m}</option>`).join('')}</select></div>
    </div>
    <div class="form-grid">
      <div class="fg"><label>Prioridad</label><select id="e-pri"><option value="alta" ${t.priority==='alta'?'selected':''}>Alta</option><option value="media" ${t.priority==='media'?'selected':''}>Media</option><option value="baja" ${t.priority==='baja'?'selected':''}>Baja</option></select></div>
      <div class="fg"><label>Estado</label><select id="e-status">
        <option value="pendiente" ${t.status==='pendiente'?'selected':''}>Pendiente</option>
        <option value="en progreso" ${t.status==='en progreso'?'selected':''}>En progreso</option>
        <option value="bloqueado" ${t.status==='bloqueado'?'selected':''}>Bloqueado</option>
        <option value="completado" ${t.status==='completado'?'selected':''}>Completado</option>
      </select></div>
    </div>
    <div class="form-grid">
      <div class="fg"><label>Fecha inicio</label><input type="date" id="e-start"></div>
      <div class="fg"><label>Fecha límite</label><input type="date" id="e-due" value="${t.due||''}"></div>
    </div>
    <div class="form-grid full"><div class="fg"><label>Descripción</label><textarea id="e-desc">${t.desc||''}</textarea></div></div>
    <div class="gcal-box">
      <div class="gcal-icon"><i class="ti ti-brand-google"></i></div>
      <div class="gcal-text">
        <strong>Exportar a Google Calendar</strong>
        <span>Abre el formulario de Google Calendar con los datos</span>
      </div>
      <button class="btn btn-sm" onclick="exportGcalSingle(${id})"><i class="ti ti-external-link"></i> Exportar</button>
    </div>
    <div class="modal-foot">
      <button class="btn btn-danger" onclick="deleteTask(${id});closeModal()"><i class="ti ti-trash"></i> Eliminar</button>
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEditTask(${id})"><i class="ti ti-check"></i> Guardar</button>
    </div>
  </div>`);
}

function saveEditTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.name=document.getElementById('e-name').value.trim()||t.name;
  t.project=parseInt(document.getElementById('e-proj').value);
  t.assignee=document.getElementById('e-ass').value;
  t.priority=document.getElementById('e-pri').value;
  t.status=document.getElementById('e-status').value;
  t.due=document.getElementById('e-due').value||null;
  t.desc=document.getElementById('e-desc').value;
  closeModal();render();
}

function exportGcalSingle(id){
  const t=tasks.find(x=>x.id===id);
  if(!t||!t.due){alert('Agrega una fecha límite primero.');return;}
  window.open(buildGCalUrl(t.name,t.due,'Proyecto: '+proj(t.project).name+(t.desc?'\n'+t.desc:'')),'_blank');
}

function openGmailBulk(){
  const withDue=tasks.filter(t=>t.due&&t.status!=='completado');
  openModal(`<div class="modal">
    <div class="modal-h">
      <h2>Exportar a Google Calendar</h2>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Selecciona las tareas que quieres añadir a tu calendario. Se abrirá Google Calendar para cada una.</p>
    <div style="border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;max-height:320px;overflow-y:auto">
      ${withDue.length===0?'<div style="padding:16px;font-size:13px;color:var(--text3);text-align:center">No hay tareas con fecha límite pendientes.</div>':
      withDue.map((t,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;${i?'border-top:1px solid var(--border)':''}">
        <input type="checkbox" id="sync-${t.id}" checked style="width:15px;height:15px;accent-color:var(--blue);cursor:pointer">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:500">${t.name}</div>
          <div style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:6px;margin-top:2px">
            <span class="proj-dot" style="background:${proj(t.project).color}"></span>${proj(t.project).name}
            · ${t.assignee} · <span ${isOverdue(t.due,t.status)?'style="color:var(--red)"':''}>${fmtDate(t.due)}</span>
          </div>
        </div>
        <span class="badge ${priorityClass(t.priority)}">${t.priority}</span>
      </div>`).join('')}
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="bulkExport()"><i class="ti ti-brand-google"></i> Exportar seleccionadas</button>
    </div>
  </div>`);
}

function bulkExport(){
  const toExp=tasks.filter(t=>t.due&&document.getElementById('sync-'+t.id)?.checked);
  closeModal();
  toExp.forEach((t,i)=>setTimeout(()=>{
    window.open(buildGCalUrl(t.name,t.due,'Proyecto: '+proj(t.project).name+(t.desc?'\n'+t.desc:'')),'_blank');
  },i*600));
}

function openAddProject(){
  openModal(`<div class="modal" style="max-width:380px">
    <div class="modal-h">
      <h2>Nuevo proyecto</h2>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="fg" style="margin-bottom:14px"><label>Nombre del proyecto</label><input id="p-name" placeholder="Ej: Lanzamiento Q4 2025"></div>
    <div class="fg" style="margin-bottom:6px"><label>Color del proyecto</label></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;padding:4px 0 16px">
      ${PROJ_COLORS.map((c,i)=>`<div onclick="document.querySelectorAll('.pc-opt').forEach(x=>{x.style.transform='scale(1)';x.style.outline='none'});this.style.transform='scale(1.2)';this.style.outline='2px solid ${c}';this.style.outlineOffset='3px';window._sc='${c}'" class="pc-opt" style="width:26px;height:26px;border-radius:50%;background:${c};cursor:pointer;transition:transform .12s;${i===0?'transform:scale(1.2);outline:2px solid '+c+';outline-offset:3px':''}"></div>`).join('')}
    </div>
    <div class="modal-foot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveProject()"><i class="ti ti-check"></i> Crear proyecto</button>
    </div>
  </div>`);
  window._sc=PROJ_COLORS[0];
}

function saveProject(){
  const name=document.getElementById('p-name').value.trim();
  if(!name)return;
  projects.push({id:Date.now(),name,color:window._sc||PROJ_COLORS[0]});
  closeModal();render();
}

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
